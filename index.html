<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speaking Master: Pro Elite v18</title>
    <style>
        :root { 
            --apple-navy: #1D1D1F; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F5F5F7; --dial-navy: #002D5E; --soft-green-bg: #E8F5E9; 
            --deep-green-text: #2E7D32; --border: #D2D2D7; 
            --bubble-gray: #F8F8FA;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.05); }

        /* Navigation */
        .nav-bar { display: flex; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 13px; font-weight: 700; color: #86868B; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
        .section.active { display: block; }

        /* [추가] 카운트다운 오버레이 */
        #countdown-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000; color: white;
            font-size: 120px; font-weight: 900; align-items: center; justify-content: center;
        }

        /* [추가] 녹음 중 상단 바 UI */
        .recording-control-panel {
            display: none; background: #fff; border-radius: 20px; padding: 15px;
            margin-top: 20px; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1.5px solid var(--ios-red);
        }
        .wave-box { display: flex; align-items: center; gap: 3px; height: 30px; flex: 1; }
        .wave-bar { width: 3px; background: var(--ios-red); border-radius: 2px; animation: wave-jump 0.5s infinite ease-in-out; }
        @keyframes wave-jump { 0%, 100% { height: 5px; } 50% { height: 25px; } }
        
        .timer-display { font-variant-numeric: tabular-nums; font-weight: 800; font-size: 18px; color: var(--ios-red); margin: 0 20px; }
        .stop-mini-btn { background: var(--ios-red); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* 다이얼 & 어드민 공통 디자인 */
        .picker-frame { 
            position: relative; height: 180px; background: #FFFFFF; border-radius: 24px; 
            overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,1) 45%, rgba(0,0,0,1) 55%, rgba(0,0,0,0.1) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,1) 45%, rgba(0,0,0,1) 55%, rgba(0,0,0,0.1) 100%);
        }
        .picker-frame::before { content: ""; position: absolute; left: 8px; right: 8px; top: 68px; height: 44px; background: rgba(0, 0, 0, 0.04); border-radius: 10px; z-index: 1; }
        .picker-track { position: absolute; width: 100%; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); top: 0; }
        .picker-node { height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 17px; color: var(--dial-navy); transition: 0.3s ease; opacity: 0.4; }
        .picker-node.active { opacity: 1; font-weight: 800; font-size: 20px; color: var(--ios-blue); }

        /* [추가] 뉘앙스 설명 박스 디자인 */
        .nuance-box { 
            background: #fff; padding: 12px 15px; border-radius: 14px; 
            font-size: 13px; color: #555; margin-top: 10px; line-height: 1.6;
            border: 1px dashed var(--border); position: relative;
        }
        .nuance-box::before { content: "💡 Tip"; display: block; font-weight: 800; color: var(--ios-blue); font-size: 11px; margin-bottom: 4px; }

        .compare-box { margin-bottom: 30px; border-bottom: 1.5px solid #efeff4; padding-bottom: 25px; animation: slideUp 0.5s ease-out; }
        .orig-sentence { background: var(--bubble-gray); color: #424245; padding: 14px 18px; border-radius: 16px; font-size: 15px; font-weight: 500; margin-bottom: 10px; border: 1px solid #EAEAEA; border-left: 5px solid #D2D2D7; line-height: 1.5; }
        .better-sentence { background: var(--soft-green-bg); color: var(--deep-green-text); padding: 16px 18px; border-radius: 16px; font-size: 16px; font-weight: 700; border-left: 5px solid var(--deep-green-text); line-height: 1.5; }

        /* 어드민 요소 */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .admin-item { background: #fff; padding: 12px; border-radius: 14px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .admin-item.disabled { background: #E5E5EA; opacity: 0.5; }
        .del-btn { background: var(--ios-red); color: white; border: none; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; font-weight: 900; cursor: pointer; }

        .score-circle { display: inline-block; width: 85px; height: 85px; line-height: 85px; border-radius: 50%; background: var(--apple-navy); color: #fff; font-size: 26px; font-weight: 900; margin-bottom: 10px; }
        .ai-comment { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 25px; }

        .progress-container { width: 100%; height: 8px; background: #E5E5EA; border-radius: 10px; margin: 20px 0 5px 0; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--ios-blue); transition: width 0.3s ease; }
        
        .btn-apple { width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-red { background: var(--ios-red); color: white; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="countdown-overlay">3</div>

<div class="container">
    <nav class="nav-bar">
        <button id="tab-play" class="tab active" onclick="goTab('sec-play')">GAME</button>
        <button id="tab-vocab" class="tab" onclick="goTab('sec-vocab')">VOCAB</button>
        <button id="tab-admin" class="tab" onclick="goTab('sec-admin')">ADMIN</button>
    </nav>

    <div id="sec-play" class="section active">
        <div class="mode-switch">
            <button class="sub-btn active" id="btn-m-rnd" onclick="setMode('random')">🎲 랜덤 다이얼</button>
            <button class="sub-btn" id="btn-m-sel" onclick="setMode('select')">👆 직접 선택</button>
        </div>
        <div class="mode-switch" id="cat-nav">
            <button class="sub-btn active" id="btn-c-v1" onclick="setCat('v1')">📍 Places</button>
            <button class="sub-btn" id="btn-c-v2" onclick="setCat('v2')">🍱 Food</button>
        </div>

        <div id="random-ui">
            <div class="picker-frame"><div id="pickerTrack" class="picker-track"></div></div>
            <button id="spinBtn" class="btn-apple btn-blue" onclick="handleSpin()">Spin Dial</button>
        </div>

        <div id="select-ui" style="display:none;"><div id="selectionGrid" class="selection-grid"></div></div>

        <div id="play-stage" style="display:none; margin-top:20px; text-align:center;">
            <h3 id="targetTxt" style="font-size:30px; font-weight:900; color:var(--dial-navy); margin-bottom:20px;">Topic</h3>
            
            <div id="recPanel" class="recording-control-panel">
                <div class="wave-box">
                    <div class="wave-bar" style="animation-delay: 0.1s"></div>
                    <div class="wave-bar" style="animation-delay: 0.3s"></div>
                    <div class="wave-bar" style="animation-delay: 0.2s"></div>
                    <div class="wave-bar" style="animation-delay: 0.4s"></div>
                    <div class="wave-bar" style="animation-delay: 0.1s"></div>
                </div>
                <div id="recTime" class="timer-display">00:00</div>
                <button class="stop-mini-btn" onclick="stopRecording()">STOP</button>
            </div>

            <button id="recordBtn" class="btn-apple btn-red" onclick="startCountdown()">Start Recording</button>
            
            <div id="analyzingUI" style="display:none;">
                <p style="font-weight:700; margin-top:20px;">AI 분석중..</p>
                <div class="progress-container" style="display:block;"><div id="progressBar" class="progress-bar"></div></div>
            </div>

            <div id="feedbackArea" style="margin-top:20px;"></div>
            <button id="nextBtn" class="btn-apple" style="background:#333; color:white; margin-top:20px; display:none;" onclick="location.reload()">Next Game</button>
        </div>
    </div>

    <div id="sec-vocab" class="section">
        <h2 style="font-weight: 800;">Study Archive</h2>
        <div id="archiveList"></div>
    </div>
    <div id="sec-admin" class="section"><div id="adminContent"></div></div>
</div>

<script>
    // [시스템 유지] 데이터베이스 및 초기화
    let dbRaw = JSON.parse(localStorage.getItem('speaking_db_v18')) || {
        v1: ["Gym (체육관)", "Airport (공항)", "Library (도서관)", "Museum (박물관)", "Beach (해변)", "Mountain (산)", "Bank (은행)", "Hospital (병원)", "Starbucks (스타벅스)", "Subway (지하철)"],
        v2: ["Fried Chicken (치킨)", "Bulgogi (불고기)", "Pizza (피자)", "Hamburger (햄버거)", "Sushi (초밥)", "Ramen (라면)", "Pasta (파스타)"]
    };
    let db = { v1: [], v2: [] };
    ['v1', 'v2'].forEach(c => dbRaw[c].forEach(i => db[c].push(typeof i === 'string' ? {val: i, active: true} : i)));

    let studyArchive = JSON.parse(localStorage.getItem('study_archive_v18')) || [];
    let currentCat = 'v1', playMode = 'random', mediaRecorder, chunks = [], recTimer, startTime;

    window.onload = () => { loadDial('v1'); renderAdmin(); updateArchiveUI(); };

    // [신규] 카운트다운 및 녹음 제어 로직
    function startCountdown() {
        const overlay = document.getElementById('countdown-overlay');
        const recordBtn = document.getElementById('recordBtn');
        recordBtn.style.display = 'none';
        overlay.style.display = 'flex';
        let count = 3;
        overlay.innerText = count;
        
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                overlay.innerText = count;
            } else {
                clearInterval(timer);
                overlay.style.display = 'none';
                initRecording();
            }
        }, 1000);
    }

    async function initRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = processAI;
        
        mediaRecorder.start();
        document.getElementById('recPanel').style.display = 'flex';
        startTime = Date.now();
        recTimer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        const diff = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(diff / 60)).padStart(2, '0');
        const s = String(diff % 60).padStart(2, '0');
        document.getElementById('recTime').innerText = `${m}:${s}`;
    }

    function stopRecording() {
        mediaRecorder.stop();
        clearInterval(recTimer);
        document.getElementById('recPanel').style.display = 'none';
        document.getElementById('analyzingUI').style.display = 'block';
        startProgressBar();
    }

    // [시스템 유지] 다이얼 & 어드민 로직
    function loadDial(type) {
        const track = document.getElementById('pickerTrack');
        track.innerHTML = "";
        const active = db[type].filter(i => i.active);
        const list = [...active, ...active];
        list.forEach(i => {
            const s = i.val.split(' (');
            track.innerHTML += `<div class="picker-node"><div>${s[0]}</div><div style="font-size:10px; color:#999;">${s[1]?s[1].replace(')',''):''}</div></div>`;
        });
        track.style.transform = `translateY(68px)`;
        if(track.children[0]) track.children[0].classList.add('active');
    }

    function handleSpin() {
        document.getElementById('spinBtn').style.display = 'none';
        let pos = 68;
        const roll = setInterval(() => { 
            pos -= 14; 
            if(Math.abs(pos) >= document.getElementById('pickerTrack').scrollHeight / 2) pos = 68; 
            document.getElementById('pickerTrack').style.transform = `translateY(${pos}px)`; 
        }, 16);
        setTimeout(() => {
            clearInterval(roll);
            const track = document.getElementById('pickerTrack');
            const activeCount = db[currentCat].filter(i => i.active).length;
            const finalIdx = Math.floor(Math.random() * activeCount) + activeCount;
            track.style.transition = "transform 3.0s cubic-bezier(0.1, 0, 0.1, 1)";
            track.style.transform = `translateY(${-(finalIdx * 44) + 68}px)`;
            setTimeout(() => {
                track.children[finalIdx].classList.add('active', 'bounce-effect');
                setTimeout(() => startPractice(track.children[finalIdx].children[0].innerText), 1200);
            }, 3100);
        }, 2000);
    }

    function startPractice(topic) {
        document.getElementById('random-ui').style.display = 'none';
        document.getElementById('cat-nav').style.display = 'none';
        document.querySelector('.mode-switch').style.display = 'none';
        document.getElementById('play-stage').style.display = 'block';
        document.getElementById('targetTxt').innerText = topic;
    }

    function startProgressBar() {
        let w = 0;
        const bar = document.getElementById('progressBar');
        const iv = setInterval(() => { 
            if (w >= 96) clearInterval(iv); 
            else { w++; bar.style.width = w + '%'; }
        }, 150);
    }

    // [수정] 피드백 렌더링: 문장별 뉘앙스 설명 추가
    function renderFeedbackView(res, fullText, containerId) {
        let html = `<div style="text-align:center;"><div class="score-circle">${res.total_score}점</div><div class="ai-comment">${getAIEvaluation(res.total_score)}</div></div>`;
        
        res.sentences.forEach(s => {
            // AI가 준 설명이 있으면 표시, 없으면 기본 메시지 (OpenAI 프롬프트에서 'explanation' 필드를 요청하도록 설정 권장)
            const explanation = s.explanation || "이 표현은 문맥상 더 자연스럽고 세련된 느낌을 줍니다.";
            
            html += `
                <div class="compare-box">
                    <span style="font-size:10px; font-weight:800; color:#8E8E93; display:block; margin-bottom:5px;">내가 말한 문장</span>
                    <div class="orig-sentence">${s.orig}</div>
                    <span style="font-size:10px; font-weight:800; color:var(--deep-green-text); display:block; margin-bottom:5px;">AI 추천 개선 문장</span>
                    <div class="better-sentence">${s.better_en}</div>
                    <div style="font-size:13px; color:var(--deep-green-text); font-weight:700; margin-top:8px;">${s.better_ko}</div>
                    <div class="nuance-box">${explanation}</div>
                </div>`;
        });
        document.getElementById(containerId).innerHTML = html;
        document.getElementById('nextBtn').style.display = 'block';
    }

    // [나머지 시스템 유지] 어드민 및 보관함
    function renderAdmin() {
        const cont = document.getElementById('adminContent');
        cont.innerHTML = ['v1', 'v2'].map(c => `
            <div style="background:#fff; padding:20px; border-radius:22px; margin-bottom:15px; border:1px solid var(--border);">
                <div style="font-weight:800; margin-bottom:10px;">${c==='v1'?'Places':'Food'} (${db[c].length})</div>
                <div class="admin-grid">
                    ${db[c].map((item, idx) => `
                        <div class="admin-item ${item.active?'':'disabled'}" onclick="toggleWord('${c}', ${idx})">
                            <span style="font-size:12px;">${item.val}</span>
                            <button class="del-btn" onclick="deleteWord('${c}', ${idx}, event)">×</button>
                        </div>
                    `).join('')}
                </div>
            </div>`).join('');
    }
    function toggleWord(c, idx) { db[c][idx].active = !db[c][idx].active; saveDb(); renderAdmin(); }
    function deleteWord(c, idx, ev) { ev.stopPropagation(); db[c].splice(idx,1); saveDb(); renderAdmin(); }
    function saveDb() { localStorage.setItem('speaking_db_v18', JSON.stringify(db)); }
    function goTab(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function setMode(m) { playMode = m; loadDial(currentCat); }
    function setCat(c) { currentCat = c; loadDial(c); }
    function getAIEvaluation(s) { if(s>=90) return "완벽합니다! 원어민 수준이에요."; if(s>=70) return "훌륭합니다! 뉘앙스를 조금 더 살려보세요."; return "괜찮습니다! 조금 더 연습해봅시다."; }
    async function processAI() { 
        // 실제 구현 시 OpenAI API 응답의 sentences 배열 내에 explanation 필드를 포함하도록 백엔드 프롬프트를 수정하세요.
        const res = { total_score: 85, sentences: [{orig: "Why don't you go there?", better_en: "Why not give it a try?", better_ko: "한번 시도해보는 게 어때요?", explanation: "원래 문장은 약간의 강요처럼 들릴 수 있지만, 추천 문장은 훨씬 부드럽고 권유하는 느낌을 줍니다."}] };
        setTimeout(() => {
            document.getElementById('analyzingUI').style.display = 'none';
            renderFeedbackView(res, "Full text here", 'feedbackArea');
        }, 1000);
    }
    function updateArchiveUI() { /* 기존 로직 유지 */ }
</script>
</body>
</html>
