<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speaking Master: Vercel Pro</title>
    <style>
        :root { 
            --apple-navy: #1D1D1F; 
            --ios-blue: #007AFF; 
            --ios-red: #D70015; 
            --ios-bg: #F5F5F7; 
            --dial-navy: #002D5E;
            --soft-green-bg: #E8F5E9; 
            --deep-green-text: #2E7D32; 
            --border: #D2D2D7;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); -webkit-font-smoothing: antialiased; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.05); }

        /* Navigation */
        .nav-bar { display: flex; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 13px; font-weight: 700; color: #86868B; cursor: pointer; transition: 0.2s; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
        .section.active { display: block; }

        /* Picker UI */
        .picker-frame { position: relative; height: 180px; background: #FFFFFF; border-radius: 20px; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border); }
        .picker-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, #fff 0%, rgba(255,255,255,0) 25%, rgba(255,255,255,0) 75%, #fff 100%); pointer-events: none; z-index: 5; }
        .picker-track { position: absolute; width: 100%; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .picker-node { height: 44px; display: flex; align-items: center; justify-content: center; font-size: 17px; color: var(--dial-navy); opacity: 0.3; }
        .picker-node.active { opacity: 1; font-weight: 800; font-size: 20px; }

        /* Buttons & Cards */
        .btn-apple { width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-red { background: var(--ios-red); color: white; }
        .score-circle { display: inline-block; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; background: var(--apple-navy); color: #fff; font-size: 24px; font-weight: 900; margin-bottom: 15px; }
        .sentence-card { background: #fff; padding: 20px; border-radius: 24px; margin-bottom: 15px; border: 0.5px solid var(--border); text-align: left; }
        .better-highlight { background: var(--soft-green-bg); color: var(--deep-green-text); padding: 3px 8px; border-radius: 6px; font-weight: 700; font-size: 17px; display: inline; }
        .tip-box { font-size: 12px; color: #555; background: #F2F2F7; padding: 12px; border-radius: 12px; margin-top: 10px; border-left: 3.5px solid var(--deep-green-text); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-bar">
        <button class="tab active" onclick="goTab('sec-play')">GAME</button>
        <button class="tab" onclick="goTab('sec-vocab')">VOCAB</button>
    </nav>

    <div id="sec-play" class="section active">
        <div class="picker-frame">
            <div class="picker-overlay"></div>
            <div id="pickerTrack" class="picker-track"></div>
        </div>
        <button id="spinBtn" class="btn-apple btn-blue" onclick="handleSpin()">Spin Dial</button>
        
        <div id="play-stage" style="display:none; margin-top:20px; text-align:center;">
            <h3 id="targetTxt" style="font-size:26px; font-weight:900;">Topic</h3>
            <button id="recordBtn" class="btn-apple btn-red">Start Recording</button>
            <div id="feedbackArea" style="margin-top:20px;"></div>
            <button id="nextBtn" class="btn-apple" style="background:#333; color:white; display:none;" onclick="location.reload()">Next Game</button>
        </div>
    </div>

    <div id="sec-vocab" class="section">
        <h2 style="font-weight: 800;">Study Archive</h2>
        <div id="archiveList"></div>
    </div>
</div>

<script>
    let db = {
        v1: ["Gym", "Central Park", "Starbucks", "Library", "Pharmacy", "Airport", "Luxury Hotel", "Museum", "Zoo", "Beach", "Mountain", "Post Office"],
        v2: ["Fried Chicken", "Kimchi Stew", "Bulgogi", "Tteokbokki", "Bibimbap", "Samgyeopsal", "Pasta", "Steak", "Sushi", "Ramen"]
    };

    let studyArchive = JSON.parse(localStorage.getItem('study_archive_v10')) || [];
    let mediaRecorder, chunks = [];

    window.onload = () => {
        const track = document.getElementById('pickerTrack');
        db.v1.forEach(item => track.innerHTML += `<div class="picker-node">${item}</div>`);
    };

    function goTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'sec-vocab') renderArchive();
    }

    function handleSpin() {
        const track = document.getElementById('pickerTrack');
        const spinBtn = document.getElementById('spinBtn');
        spinBtn.disabled = true;
        
        let finalIdx = Math.floor(Math.random() * db.v1.length);
        track.style.transition = "transform 3s cubic-bezier(0.1, 0, 0.1, 1)";
        track.style.transform = `translateY(${-(finalIdx * 44) + 66}px)`;

        setTimeout(() => {
            document.getElementById('play-stage').style.display = 'block';
            document.getElementById('targetTxt').innerText = db.v1[finalIdx];
            spinBtn.style.display = 'none';
        }, 3200);
    }

    document.getElementById('recordBtn').onclick = async function() {
        if(this.innerText.includes("Start")) {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(s);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => getDeepFeedback();
            mediaRecorder.start();
            this.innerText = "Stop & Analyzing...";
            this.classList.replace('btn-red', 'btn-blue');
        } else {
            mediaRecorder.stop();
            this.disabled = true;
        }
    };

    async function getDeepFeedback() {
        const feedbackArea = document.getElementById('feedbackArea');
        feedbackArea.innerHTML = "<p>AI가 Vercel 보안 서버에서 분석 중입니다...</p>";
        
        const userSpeech = "I visited the " + document.getElementById('targetTxt').innerText + " yesterday."; 
        const prompt = `Analyze user speech about topic "${document.getElementById('targetTxt').innerText}". Score 0-100. JSON format only: {"total_score": 85, "sentences": [{"orig": "User speech", "better_en": "Improved version", "better_ko": "한국어 번역", "tip_en": "Grammar tip", "tip_ko": "팁 번역"}]}`;

        try {
            // [Vercel 전용 경로 호출]
            const response = await fetch("/api/openai-proxy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: prompt + "\nSpeech: " + userSpeech })
            });

            const res = await response.json();
            renderFeedbackView(res, userSpeech);
            
            // 기록 저장
            studyArchive.unshift({ id: Date.now(), topic: document.getElementById('targetTxt').innerText, score: res.total_score, res, userSpeech });
            localStorage.setItem('study_archive_v10', JSON.stringify(studyArchive));
            
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('recordBtn').style.display = 'none';
        } catch (e) {
            feedbackArea.innerHTML = "<p style='color:red;'>분석 실패. Vercel 환경 변수를 확인하세요.</p>";
        }
    }

    function renderFeedbackView(res, fullText) {
        let html = `<div class="score-circle">${res.total_score}점</div>`;
        res.sentences.forEach(s => {
            html += `
                <div class="sentence-card">
                    <div style="color:#888; font-size:12px;">${s.orig}</div>
                    <div class="better-highlight">${s.better_en}</div>
                    <div style="color:var(--deep-green-text); font-weight:700; margin-top:5px;">${s.better_ko}</div>
                    <div class="tip-box">💡 ${s.tip_en} (${s.tip_ko})</div>
                </div>`;
        });
        document.getElementById('feedbackArea').innerHTML = html;
    }

    function renderArchive() {
        const list = document.getElementById('archiveList');
        list.innerHTML = studyArchive.map(e => `
            <div class="sentence-card">
                <div style="font-weight:800;">${e.topic} - ${e.score}점</div>
                <div style="font-size:12px; color:#666;">${e.userSpeech}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
