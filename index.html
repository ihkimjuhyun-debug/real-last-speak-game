<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speaking Master: Pro Elite v17</title>
    <style>
        :root { 
            --apple-navy: #1D1D1F; --ios-blue: #007AFF; --ios-red: #D70015; 
            --ios-bg: #F5F5F7; --dial-navy: #002D5E; --soft-green-bg: #E8F5E9; 
            --deep-green-text: #2E7D32; --border: #D2D2D7; 
            --bubble-gray: #F8F8FA; /* 아주 미세한 회색 (말풍선용) */
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.05); }

        /* Navigation */
        .nav-bar { display: flex; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 13px; font-weight: 700; color: #86868B; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
        .section.active { display: block; }

        .mode-switch { display: flex; gap: 8px; margin-bottom: 12px; }
        .sub-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #fff; font-size: 12px; font-weight: 800; color: #86868B; cursor: pointer; transition: 0.2s; }
        .sub-btn.active { background: var(--ios-blue); color: #fff; border-color: var(--ios-blue); box-shadow: 0 4px 10px rgba(0,122,255,0.3); }

        /* [수정] 다이얼 디자인: 아이폰 타이머 스타일 + 중앙 강조 */
        .picker-frame { 
            position: relative; height: 180px; background: #FFFFFF; border-radius: 24px; 
            overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border);
            /* 중앙만 밝게 처리하는 마스크 */
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,1) 45%, rgba(0,0,0,1) 55%, rgba(0,0,0,0.1) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,1) 45%, rgba(0,0,0,1) 55%, rgba(0,0,0,0.1) 100%);
        }
        .picker-frame::before {
            content: ""; position: absolute; left: 8px; right: 8px; top: 68px; height: 44px;
            background: rgba(0, 0, 0, 0.04); border-radius: 10px; z-index: 1; pointer-events: none;
        }

        .picker-track { position: absolute; width: 100%; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); top: 0; }
        .picker-node { 
            height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 17px; color: var(--dial-navy); transition: 0.3s ease; opacity: 0.4;
        }
        .picker-node.active { 
            opacity: 1; font-weight: 800; font-size: 20px; color: var(--ios-blue); z-index: 2;
        }

        .bounce-effect { animation: bounce 0.6s cubic-bezier(0.36, 0, 0.66, -0.56) alternate; }
        @keyframes bounce { 0% { transform: translateY(0); } 50% { transform: translateY(-5px) scale(1.05); } 100% { transform: translateY(0) scale(1); } }

        /* 피드백 카드: 문장 단위 세분화 */
        .compare-box { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .orig-sentence { 
            background: var(--bubble-gray); color: #424245; padding: 14px 18px; 
            border-radius: 16px; font-size: 15px; font-weight: 500; margin-bottom: 10px; 
            border: 1px solid #EAEAEA; border-left: 5px solid #D2D2D7; line-height: 1.5;
        }
        .better-sentence { 
            background: var(--soft-green-bg); color: var(--deep-green-text); padding: 16px 18px; 
            border-radius: 16px; font-size: 16px; font-weight: 700; border-left: 5px solid var(--deep-green-text); line-height: 1.5;
        }

        /* 점수 & 총평 */
        .score-circle { display: inline-block; width: 85px; height: 85px; line-height: 85px; border-radius: 50%; background: var(--apple-navy); color: #fff; font-size: 26px; font-weight: 900; margin-bottom: 10px; }
        .ai-comment { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 25px; white-space: pre-line; }

        /* [수정] 어드민 모드: 삭제 및 비활성화 버튼 */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .admin-item { 
            background: #fff; padding: 12px; border-radius: 14px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; position: relative;
            transition: 0.2s; cursor: pointer;
        }
        .admin-item.disabled { background: #E5E5EA; opacity: 0.6; }
        .admin-item .item-text { font-size: 12px; font-weight: 700; color: var(--dial-navy); flex: 1; }
        .admin-item .del-btn { 
            background: var(--ios-red); color: white; border: none; width: 22px; height: 22px; 
            border-radius: 50%; font-size: 12px; font-weight: 900; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; margin-left: 10px;
        }

        .selection-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-height: 400px; overflow-y: auto; }
        .grid-item { background: #fff; padding: 15px 5px; border-radius: 14px; font-size: 12px; font-weight: 700; text-align: center; border: 0.5px solid var(--border); cursor: pointer; }

        .progress-container { width: 100%; height: 8px; background: #E5E5EA; border-radius: 10px; margin: 20px 0 5px 0; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--ios-blue); transition: width 0.3s ease; }
        #progressPercent { display: block; font-size: 14px; font-weight: 800; color: var(--ios-blue); margin-bottom: 20px; }

        .btn-apple { width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-red { background: var(--ios-red); color: white; }

        #detail-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ios-bg); z-index: 2000; overflow-y: auto; }
        .detail-header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .archive-card { background: #fff; padding: 22px; border-radius: 24px; margin-bottom: 15px; border: 0.5px solid var(--border); cursor: pointer; display: flex; flex-direction: column; gap: 8px; position: relative; }
        .arc-header { display: flex; justify-content: space-between; align-items: center; }
        .arc-time { font-size: 11px; font-weight: 800; color: var(--ios-blue); }
        .arc-topic { font-size: 19px; font-weight: 900; color: var(--dial-navy); }
        .arc-score-tag { font-size: 13px; font-weight: 800; color: var(--apple-navy); background: #eee; padding: 2px 8px; border-radius: 6px; align-self: start; }
        .delete-btn { font-size: 11px; color: var(--ios-red); font-weight: 700; background: none; border: none; cursor: pointer; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-bar">
        <button id="tab-play" class="tab active" onclick="goTab('sec-play')">GAME</button>
        <button id="tab-vocab" class="tab" onclick="goTab('sec-vocab')">VOCAB</button>
        <button id="tab-admin" class="tab" onclick="goTab('sec-admin')">ADMIN</button>
    </nav>

    <div id="sec-play" class="section active">
        <div class="mode-switch">
            <button class="sub-btn active" id="btn-m-rnd" onclick="setMode('random')">🎲 랜덤 다이얼</button>
            <button class="sub-btn" id="btn-m-sel" onclick="setMode('select')">👆 직접 선택</button>
        </div>
        <div class="mode-switch" id="cat-nav">
            <button class="sub-btn active" id="btn-c-v1" onclick="setCat('v1')">📍 Places</button>
            <button class="sub-btn" id="btn-c-v2" onclick="setCat('v2')">🍱 Food</button>
        </div>

        <div id="random-ui">
            <div class="picker-frame">
                <div id="pickerTrack" class="picker-track"></div>
            </div>
            <button id="spinBtn" class="btn-apple btn-blue" onclick="handleSpin()">Spin Dial</button>
            <button id="stopBtn" class="btn-apple" style="background:#1c1c1e; color:white; display:none;" onclick="stopSpin()">STOP</button>
        </div>

        <div id="select-ui" style="display:none;">
            <div id="selectionGrid" class="selection-grid"></div>
        </div>

        <div id="play-stage" style="display:none; margin-top:20px; text-align:center;">
            <h3 id="targetTxt" style="font-size:30px; font-weight:900; color:var(--dial-navy); margin-bottom:20px;">Topic</h3>
            <button id="recordBtn" class="btn-apple btn-red">Start Recording</button>
            
            <div id="analyzingUI" style="display:none;">
                <p style="font-weight:700; margin-top:20px;">AI 가 문장을 분석중..</p>
                <div class="progress-container" style="display:block;">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <span id="progressPercent">0%</span>
            </div>

            <div id="feedbackArea" style="margin-top:20px;"></div>
            <button id="nextBtn" class="btn-apple" style="background:#333; color:white; margin-top:20px; display:none;" onclick="location.reload()">Next Game</button>
        </div>
    </div>

    <div id="sec-vocab" class="section">
        <h2 style="font-weight: 800;">Study Archive</h2>
        <div id="archiveList"></div>
        <button class="btn-apple" style="background:#8E8E93; color:white; font-size:12px; margin-top:30px;" onclick="clearArchive()">전체 기록 삭제</button>
    </div>

    <div id="sec-admin" class="section">
        <h2 style="font-weight: 800;">Management</h2>
        <div id="adminContent"></div>
    </div>
</div>

<div id="detail-view">
    <div class="detail-header">
        <button onclick="closeDetail()" style="border:none; background:none; color:var(--ios-blue); font-weight:700; font-size:16px;">&lt; Back</button>
        <span id="detail-title-ts" style="font-size:13px; font-weight:800;">Analysis Details</span>
        <div style="width:50px;"></div>
    </div>
    <div id="detail-content" style="padding:20px;"></div>
</div>

<script>
    // [데이터 업데이트] 단순 문자열에서 객체 구조로 변경하여 활성화 여부 저장
    let rawDb = JSON.parse(localStorage.getItem('speaking_db_v17')) || {
        v1: ["Gym (체육관)", "Central Park (센트럴 파크)", "Pharmacy (약국)", "Airport (공항)", "Library (도서관)", "Museum (박물관)", "Zoo (동물원)", "Beach (해변)", "Mountain (산)", "Bank (은행)", "Post Office (우체국)", "Hospital (병원)", "University (대학교)", "Starbucks (스타벅스)", "Subway (지하철)", "Luxury Hotel (고급 호텔)", "Stadium (경기장)", "City Hall (시청)", "Harbor (항구)", "Amusement Park (놀이공원)", "Art Gallery (미술관)", "Police Station (경찰서)", "Fire Station (소방서)", "Castle (성)", "Temple (사원)", "Church (교회)", "Gas Station (주유소)", "Flower Shop (꽃집)", "Department Store (백화점)", "Market (시장)", "Cinema (영화관)", "Theater (극장)", "Concert Hall (콘서트 홀)", "Square (광장)", "Bridge (다리)", "Desert (사막)", "Forest (숲)", "Jungle (정글)", "Island (섬)", "Port (항구)"],
        v2: ["Fried Chicken (치킨)", "Kimchi Stew (김치찌개)", "Bulgogi (불고기)", "Tteokbokki (떡볶이)", "Bibimbap (비빔밥)", "Pasta (파스타)", "Steak (스테이크)", "Sushi (초밥)", "Ramen (라면)", "Pizza (피자)", "Hamburger (햄버거)", "Taco (타코)", "Burrito (부리토)", "Dim Sum (딤섬)", "Peking Duck (북경오리)", "Pho (쌀국수)", "Pad Thai (팟타이)", "Bagel (베이글)", "Macaron (마카롱)", "Gelato (젤라토)", "Brownie (브라우니)", "Waffle (와플)", "Pancake (팬케이크)", "Acaibowl (아사이볼)", "Salad (샐러드)", "Sandwich (샌드위치)", "Tonkatsu (돈가스)", "Udon (우동)", "Tempura (튀김)", "Kebab (케밥)", "Gyros (기로스)", "Risotto (리조또)", "Lasagna (라자냐)", "Clam Chowder (클램 차우더)", "Galbi (갈비)", "Naengmyeon (냉면)", "Dakgalbi (닭갈비)", "Yukhoe (육회)", "Gimbap (김밥)", "Japchae (잡채)", "Donut (도넛)", "Hot Dog (핫도그)", "BBQ Ribs (바비큐 립)", "Buffalo Wings (버팔로 윙)", "Omelette (오믈렛)", "Truffle Pasta (트러플 파스타)", "Bingsu (빙수)", "Malatang (마라탕)", "Tanghulu (탕후루)", "Tiramisu (티라미수)", "Croissant (크로와상)", "Cheesecake (치즈케이크)", "Mojito (모히또)", "Sangria (샹그리아)", "Soju (소주)", "Croque Monsieur (크로크무슈)", "Fish and Chips (피쉬앤칩스)", "Paella (파에야)", "Poutine (푸틴)", "Hummus (후무스)", "Falafel (팔라펠)", "Gnocchi (뇨끼)", "Ratatouille (라따뚜이)", "Sashimi (사시미)", "Unagi (장어구이)", "Shabu Shabu (샤브샤브)", "Mapo Tofu (마포두부)", "Spring Roll (스프링롤)", "Naan (난)", "Curry (카레)", "Churros (츄러스)", "Fondue (퐁듀)", "Goulash (굴라쉬)", "Escargot (에스카르고)", "Tapas (타파스)", "Miso Soup (미소된장국)", "Dumplings (만두)", "Kimchi (김치)", "Kalguksu (칼국수)", "Bossam (보쌈)", "Jokbal (족발)", "Gamjatang (감자탕)", "Sundae (순대)", "Mandu (만두)", "Pajeon (파전)", "Yakgwa (약과)", "Sikhye (식혜)", "Sujeonggwa (수정과)", "Dalgona (달고나)", "Honey Bread (허니브레드)", "Egg Drop (에그드랍)", "Gyeran-mari (계란말이)", "Dubu-kimchi (두부김치)", "Golbaengi-muchim (골뱅이무침)", "Jeon (전)", "Mandu-guk (만둣국)", "Sujebi (수제비)", "Kimbap (김밥)", "Jajangmyeon (짜장면)", "Jjamppong (짬뽕)"]
    };

    // 하위 호환성 및 객체화 작업
    let db = { v1: [], v2: [] };
    ['v1', 'v2'].forEach(cat => {
        rawDb[cat].forEach(item => {
            if (typeof item === 'string') db[cat].push({ val: item, active: true });
            else db[cat].push(item);
        });
    });

    let studyArchive = JSON.parse(localStorage.getItem('study_archive_v17')) || [];
    let currentCat = 'v1', playMode = 'random', mediaRecorder, chunks = [], rollInterval;

    window.onload = () => { loadDial('v1'); renderAdmin(); updateArchiveUI(); };

    function getAIEvaluation(score) {
        if (score >= 95) return "완벽합니다!\n실제 원어민과 대화하는 것 같네요.";
        if (score >= 90) return "거의 다 왔습니다!\n거의 원어민 수준 문장력이지만 단어가 조금 단조롭습니다!";
        if (score >= 75) return "훌륭합니다!\n도치에 조금만 익숙해지시면 좋을거 같아요.";
        if (score >= 50) return "좀 더 연습하세요.\n문법을 더 신경쓰면 좋겠어요.";
        return "기초부터 차근차근!\n짧은 문장부터 연습해봅시다.";
    }

    function goTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('tab-' + id.split('-')[1]).classList.add('active');
        if(id === 'sec-vocab') updateArchiveUI();
    }

    function setMode(m) {
        playMode = m;
        document.getElementById('btn-m-rnd').classList.toggle('active', m === 'random');
        document.getElementById('btn-m-sel').classList.toggle('active', m === 'select');
        document.getElementById('random-ui').style.display = m === 'random' ? 'block' : 'none';
        document.getElementById('select-ui').style.display = m === 'select' ? 'block' : 'none';
        if(m === 'random') loadDial(currentCat); else renderGrid();
    }

    function setCat(c) {
        currentCat = c;
        document.getElementById('btn-c-v1').classList.toggle('active', c === 'v1');
        document.getElementById('btn-c-v2').classList.toggle('active', c === 'v2');
        if(playMode === 'random') loadDial(c); else renderGrid();
    }

    // [수정] 다이얼 로드: 활성화된 단어만 표시 + 초기 정렬
    function loadDial(type) {
        const track = document.getElementById('pickerTrack');
        track.innerHTML = "";
        const activeList = db[type].filter(i => i.active);
        if(activeList.length === 0) { track.innerHTML = "<div class='picker-node active'>선택된 단어 없음</div>"; return; }
        
        const data = [...activeList, ...activeList];
        data.forEach(item => {
            const split = item.val.split(' (');
            track.innerHTML += `<div class="picker-node"><div>${split[0]}</div><div style="font-size:10px; color:#999;">${split[1]?split[1].replace(')',''):''}</div></div>`;
        });
        
        // 시작 시 첫 번째 단어가 중앙에 오도록 오프셋 조절 (68px는 중앙 박스 시작 위치)
        track.style.transform = `translateY(68px)`;
        track.children[0].classList.add('active');
    }

    function renderGrid() {
        const grid = document.getElementById('selectionGrid');
        grid.innerHTML = db[currentCat].filter(i => i.active).map(t => `<div class="grid-item" onclick="startPractice('${t.val}')">${t.val}</div>`).join('');
    }

    function handleSpin() {
        document.getElementById('spinBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.querySelectorAll('.picker-node').forEach(n => n.classList.remove('active', 'bounce-effect'));
        let pos = 68;
        rollInterval = setInterval(() => { 
            pos -= 14; 
            if(Math.abs(pos) >= document.getElementById('pickerTrack').scrollHeight / 2) pos = 68; 
            document.getElementById('pickerTrack').style.transform = `translateY(${pos}px)`; 
        }, 16);
    }

    function stopSpin() {
        clearInterval(rollInterval);
        const track = document.getElementById('pickerTrack');
        const activeList = db[currentCat].filter(i => i.active);
        const finalIdx = Math.floor(Math.random() * activeList.length) + activeList.length;
        
        track.style.transition = "transform 3.0s cubic-bezier(0.1, 0, 0.1, 1)";
        track.style.transform = `translateY(${-(finalIdx * 44) + 68}px)`;

        setTimeout(() => {
            const selectedNode = track.children[finalIdx];
            selectedNode.classList.add('active', 'bounce-effect');
            setTimeout(() => startPractice(selectedNode.children[0].innerText), 1500);
        }, 3100);
    }

    function startPractice(topic) {
        document.getElementById('random-ui').style.display = 'none';
        document.getElementById('select-ui').style.display = 'none';
        document.getElementById('cat-nav').style.display = 'none';
        document.querySelector('.mode-switch').style.display = 'none';
        document.getElementById('play-stage').style.display = 'block';
        document.getElementById('targetTxt').innerText = topic;
    }

    document.getElementById('recordBtn').onclick = async function() {
        if(this.innerText.includes("Start")) {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(s); chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => processAI();
            mediaRecorder.start();
            this.innerText = "Stop Recording";
        } else {
            mediaRecorder.stop();
            this.style.display = 'none';
            document.getElementById('analyzingUI').style.display = 'block';
            startProgressBar();
        }
    };

    function startProgressBar() {
        let width = 0;
        const bar = document.getElementById('progressBar');
        const percent = document.getElementById('progressPercent');
        const interval = setInterval(() => {
            if (width >= 96) clearInterval(interval);
            else { width += 1; bar.style.width = width + '%'; percent.innerText = width + '%'; }
        }, 150);
    }

    async function processAI() {
        const blob = new Blob(chunks, { type: 'audio/m4a' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            const topic = document.getElementById('targetTxt').innerText;
            try {
                const response = await fetch("/api/openai-proxy", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ audio: base64Audio, topic: topic })
                });
                const data = await response.json();
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progressPercent').innerText = '100%';
                setTimeout(() => {
                    document.getElementById('analyzingUI').style.display = 'none';
                    renderFeedbackView(data, data.user_speech, 'feedbackArea');
                    saveToArchive(data, topic);
                    document.getElementById('nextBtn').style.display = 'block';
                }, 500);
            } catch (e) { alert("분석 실패."); location.reload(); }
        };
    }

    function saveToArchive(data, topic) {
        const now = new Date();
        studyArchive.unshift({
            id: Date.now(),
            ts: `${now.getMonth()+1}.${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`,
            topic: topic,
            score: data.total_score,
            sentences: data.sentences,
            full_text: data.user_speech
        });
        localStorage.setItem('study_archive_v17', JSON.stringify(studyArchive));
    }

    // [수정] 피드백 뷰: 문장 단위 세분화 레이아웃
    function renderFeedbackView(res, fullText, containerId) {
        const score = res.total_score;
        let html = `
            <div style="text-align:center;">
                <div class="score-circle">${score}점</div>
                <div class="ai-comment">${getAIEvaluation(score)}</div>
            </div>`;
        
        // 문장별 비교 박스 생성
        res.sentences.forEach(s => {
            html += `
                <div class="compare-box">
                    <span style="font-size:10px; font-weight:800; color:#8E8E93; display:block; margin-bottom:5px;">내가 말한 문장</span>
                    <div class="orig-sentence">${s.orig}</div>
                    <span style="font-size:10px; font-weight:800; color:var(--deep-green-text); display:block; margin-bottom:5px;">AI 추천 개선 문장</span>
                    <div class="better-sentence">${s.better_en}</div>
                    <div style="font-size:13px; color:var(--deep-green-text); font-weight:700; margin-top:8px;">${s.better_ko}</div>
                </div>`;
        });
        
        html += `<div style="background:#fff; padding:20px; border-radius:24px; border:1px solid var(--border); font-size:14px; text-align:left; margin-top:20px;">
                    <b style="font-size:10px; color:#888;">FULL TRANSCRIPT</b><br>${fullText}
                 </div>`;
        document.getElementById(containerId).innerHTML = html;
    }

    function updateArchiveUI() {
        const list = document.getElementById('archiveList');
        if(studyArchive.length === 0) { list.innerHTML = "<p style='text-align:center; padding:50px;'>기록이 없습니다.</p>"; return; }
        list.innerHTML = studyArchive.map(e => {
            const first = e.sentences[0] || { orig: "...", better_en: "..." };
            return `
                <div class="archive-card" onclick="openDetail(${e.id})">
                    <div class="arc-header"><span class="arc-time">${e.ts}</span><span class="delete-btn" onclick="deleteArchive(${e.id}, event)">삭제</span></div>
                    <div class="arc-topic">${e.topic}</div>
                    <div class="arc-score-tag">점수: ${e.score}점</div>
                    <div style="font-size:10px; font-weight:800; color:#bbb; margin-top:5px;">내가 말한 문장</div>
                    <div style="font-size:14px; color:#888;">${first.orig}</div>
                    <div style="font-size:10px; font-weight:800; color:var(--deep-green-text); margin-top:5px;">AI 개선 문장</div>
                    <div style="font-size:14px; color:var(--deep-green-text); font-weight:700;">${first.better_en}</div>
                </div>`;
        }).join('');
    }

    function openDetail(id) {
        const e = studyArchive.find(x => x.id === id);
        if(!e) return;
        document.getElementById('detail-title-ts').innerText = `${e.topic} (${e.ts})`;
        renderFeedbackView({ total_score: e.score, sentences: e.sentences }, e.full_text, 'detail-content');
        document.getElementById('detail-view').style.display = 'block';
    }

    function closeDetail() { document.getElementById('detail-view').style.display = 'none'; }
    function deleteArchive(id, ev) { ev.stopPropagation(); if(confirm("삭제할까요?")) { studyArchive = studyArchive.filter(x => x.id !== id); localStorage.setItem('study_archive_v17', JSON.stringify(studyArchive)); updateArchiveUI(); } }
    function clearArchive() { if(confirm("전체 삭제할까요?")) { studyArchive = []; localStorage.setItem('study_archive_v17', JSON.stringify(studyArchive)); updateArchiveUI(); } }

    // [수정] 어드민 모드: 삭제(X) 및 토글(비활성화)
    function renderAdmin() {
        const cont = document.getElementById('adminContent');
        cont.innerHTML = ['v1', 'v2'].map(c => `
            <div style="background:#fff; padding:20px; border-radius:22px; margin-bottom:15px; border:1px solid var(--border);">
                <div style="font-weight:800; margin-bottom:10px;">${c==='v1'?'Places':'Food'} (${db[c].length})</div>
                <div style="display:flex; gap:8px; margin-bottom:15px;">
                    <input type="text" id="add-${c}" placeholder="추가..." style="flex:1; border:1px solid #ddd; border-radius:10px; padding:10px; outline:none;"><button class="sub-btn active" style="width:60px;" onclick="addWord('${c}')">Add</button>
                </div>
                <div class="admin-grid">
                    ${db[c].map((item, idx) => `
                        <div class="admin-item ${item.active?'':'disabled'}" onclick="toggleWord('${c}', ${idx})">
                            <span class="item-text">${item.val}</span>
                            <button class="del-btn" onclick="deleteWord('${c}', ${idx}, event)">×</button>
                        </div>
                    `).join('')}
                </div>
            </div>`).join('');
    }

    function addWord(c) {
        const val = document.getElementById(`add-${c}`).value.trim();
        if(!val) return; 
        db[c].unshift({ val: val, active: true }); 
        saveDb();
        renderAdmin();
    }

    function deleteWord(c, idx, ev) {
        ev.stopPropagation();
        if(confirm("이 단어를 완전히 삭제할까요?")) {
            db[c].splice(idx, 1);
            saveDb();
            renderAdmin();
        }
    }

    function toggleWord(c, idx) {
        db[c][idx].active = !db[c][idx].active;
        saveDb();
        renderAdmin();
    }

    function saveDb() {
        localStorage.setItem('speaking_db_v17', JSON.stringify(db));
    }
</script>
</body>
</html>
