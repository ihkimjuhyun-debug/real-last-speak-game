<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speaking Master: Pro Elite</title>
    <style>
        :root { 
            --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7; --dial-navy: #002D5E; --soft-green-bg: #E8F5E9; 
            --deep-green-text: #2E7D32; --border: #D1D1D6; 
            --bubble-gray: #F8F8FA;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; 
            background: var(--ios-bg); margin: 0; color: var(--apple-navy); 
            -webkit-font-smoothing: antialiased; overflow-x: hidden; 
        }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.05); }

        .nav-bar { display: flex; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 13px; font-weight: 700; color: #8E8E93; cursor: pointer; transition: 0.3s; border-bottom: 2.5px solid transparent; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; min-height: 80vh; transform-origin: top; }
        .section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ✨ 애플 바운스 베이스 */
        .btn-apple { 
            width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; 
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s; 
            margin-top: 10px; display: flex; align-items: center; justify-content: center; 
        }
        .btn-apple:active { transform: scale(0.95); opacity: 0.85; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-red { background: var(--ios-red); color: white; }
        
        /* ✨ End Game 버튼 전용 스타일 */
        .btn-outline { background: #FFFFFF; color: var(--apple-navy); border: 2px solid var(--apple-navy); margin-top: 15px; }

        .mode-switch { display: flex; gap: 8px; margin-bottom: 12px; }
        .sub-btn { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #fff; font-size: 12px; font-weight: 800; color: #8E8E93; cursor: pointer; transition: 0.2s; }
        .sub-btn.active { background: var(--ios-blue); color: #fff; border-color: var(--ios-blue); box-shadow: 0 4px 12px rgba(0,122,255,0.3); }

        .picker-frame { position: relative; height: 180px; background: #FFFFFF; border-radius: 24px; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border); mask-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,1) 45%, rgba(0,0,0,1) 55%, rgba(0,0,0,0.1) 100%); -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,1) 45%, rgba(0,0,0,1) 55%, rgba(0,0,0,0.1) 100%); }
        .picker-frame::before { content: ""; position: absolute; left: 8px; right: 8px; top: 68px; height: 44px; background: rgba(0, 0, 0, 0.04); border-radius: 10px; z-index: 1; pointer-events: none; }
        .picker-track { position: absolute; width: 100%; top: 0; left: 0; transform: translateY(68px); will-change: transform; }
        .picker-node { height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 17px; color: var(--dial-navy); opacity: 0.4; }
        .picker-node.active { opacity: 1; font-weight: 800; font-size: 21px; color: var(--ios-blue); z-index: 2; }

        .score-container { text-align: center; padding: 10px 0; margin-bottom: 10px; }
        .score-circle { display: inline-block; width: 100px; height: 100px; line-height: 100px; border-radius: 50%; background: var(--apple-navy); color: #fff; font-size: 36px; font-weight: 900; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .score-comment { font-size: 16px; font-weight: 800; color: #444; margin: 25px 0 45px 0; white-space: pre-line; line-height: 1.5; text-align: center; }
        
        .compare-box { margin-bottom: 50px; border-bottom: 1.5px solid #E5E5EA; padding-bottom: 45px; }
        .label-text { font-size: 10px; font-weight: 800; color: #8E8E93; display: block; margin-bottom: 8px; letter-spacing: 1px; }
        .orig-sentence { background: var(--bubble-gray); color: #424245; padding: 18px 20px; border-radius: 20px; font-size: 15px; font-weight: 500; margin-bottom: 15px; border: 1px solid #EAEAEA; border-left: 6px solid #D1D1D6; line-height: 1.6; text-align: left; }
        .better-sentence { background: var(--soft-green-bg); color: var(--deep-green-text); padding: 18px 20px; border-radius: 20px; font-size: 16px; font-weight: 800; border-left: 6px solid var(--deep-green-text); line-height: 1.6; text-align: left; margin-bottom: 8px; }
        .ko-bubble { background: #F0F9F1; color: var(--deep-green-text); padding: 10px 16px; border-radius: 14px; font-size: 14px; font-weight: 700; display: inline-block; border: 1px solid #E0EEE1; margin-top: 2px; text-align: left; }
        .tip-card { background: #ffffff; padding: 22px 20px; border-radius: 22px; border: 1px solid #E5E5EA; margin-top: 30px; text-align: left; box-shadow: 0 5px 20px rgba(0,0,0,0.04); }

        .archive-card { background: #fff; padding: 22px; border-radius: 24px; margin-bottom: 15px; border: 1px solid var(--border); cursor: pointer; display: flex; flex-direction: column; gap: 10px; text-align: left; transition: transform 0.1s; }
        .archive-card:active { transform: scale(0.98); }
        .arc-tag { font-size: 10px; font-weight: 800; background: #eee; padding: 3px 8px; border-radius: 6px; margin-right: 5px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-bar">
        <button id="tab-play" class="tab active" onclick="goTab('sec-play')">GAME</button>
        <button id="tab-vocab" class="tab" onclick="goTab('sec-vocab')">VOCAB</button>
        <button id="tab-admin" class="tab" onclick="goTab('sec-admin')">ADMIN</button>
    </nav>

    <div id="sec-play" class="section active">
        <div class="mode-switch">
            <button class="sub-btn active" id="btn-m-rnd" onclick="setMode('random')">🎲 랜덤 다이얼</button>
            <button class="sub-btn" id="btn-m-sel" onclick="setMode('select')">👆 직접 선택</button>
        </div>
        <div class="mode-switch" id="cat-nav">
            <button class="sub-btn active" id="btn-c-v1" onclick="setCat('v1')">📍 Places</button>
            <button class="sub-btn" id="btn-c-v2" onclick="setCat('v2')">🍱 Food</button>
        </div>
        <div id="random-ui">
            <div class="picker-frame"><div id="pickerTrack" class="picker-track"></div></div>
            <button id="spinBtn" class="btn-apple btn-blue" onclick="handleSpin()">Spin Dial</button>
            <button id="stopDialBtn" class="btn-apple" style="background:#1c1c1e; color:white; display:none;" onclick="stopSpin()">STOP DIAL</button>
        </div>
        <div id="select-ui" style="display:none;"><div id="selectionGrid" class="selection-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;"></div></div>
        
        <div id="play-stage" style="display:none; margin-top:20px; text-align:center;">
            <h3 id="targetTxt" style="font-size:32px; font-weight:900; color:var(--dial-navy); margin-bottom:20px;">Topic</h3>
            <div id="recordingPanel" style="display:none; background:#fff; border-radius:24px; padding:15px 20px; margin-top:20px; align-items:center; justify-content:space-between; gap:12px; box-shadow:0 10px 30px rgba(0,0,0,0.08); border:1.5px solid var(--ios-red);">
                <div class="waveform-container" id="waveform" style="display:flex; align-items:center; gap:3.5px; height:40px; flex:2.5; overflow:hidden;"><script>for(let i=0; i<40; i++) document.write('<div class="wave-bar" style="width:3.5px; background:var(--ios-red); border-radius:2px; height:4px; transition:height 0.05s ease; flex-shrink:0;"></div>');</script></div>
                <div id="recTimer" style="font-variant-numeric:tabular-nums; font-weight:800; font-size:20px; color:var(--apple-navy); flex:1.2; text-align:center;">00:00</div>
                <button style="background:var(--ios-red); color:white; border:none; padding:12px 18px; border-radius:14px; font-weight:800; cursor:pointer; flex:1.2; font-size:14px; transition: 0.1s;" onclick="stopRecording()">STOP</button>
            </div>
            
            <button id="recordBtn" class="btn-apple btn-red" onclick="startCountdown()">Start Recording</button>
            
            <div id="analyzingUI" style="display:none;">
                <p style="font-weight:800; margin-top:25px; color:var(--ios-blue);">AI 분석 중...</p>
                <div style="width:100%; height:10px; background:#E5E5EA; border-radius:10px; overflow:hidden;"><div id="progressBar" style="width:0%; height:100%; background:var(--ios-blue); transition:0.3s;"></div></div>
                <span id="progressPercent" style="display:block; font-weight:800; margin-top:5px; color:var(--ios-blue);">0%</span>
            </div>
            
            <div id="feedbackArea" style="margin-top:25px;"></div>
            
            <div id="controlButtons" style="margin-top:20px; display:none;">
                <button class="btn-apple btn-blue" onclick="location.reload()">Next Game</button>
            </div>
            
            <button id="exitBtn" class="btn-apple btn-outline" onclick="location.reload()">End Game</button>
        </div>
    </div>

    <div id="sec-vocab" class="section">
        <h2 style="font-weight: 900; text-align: left;">Study Archive</h2>
        <div id="archiveList"></div>
        <button class="btn-clear-light" onclick="clearArchive()">전체 기록 삭제</button>
    </div>

    <div id="sec-admin" class="section">
        <h2 style="font-weight: 900; text-align: left;">Database Admin</h2>
        <div id="adminContent" style="padding-bottom:100px;"></div>
    </div>
</div>

<div id="detail-view">
    <div class="detail-header">
        <button onclick="closeDetail()" style="border:none; background:none; color:var(--ios-blue); font-weight:700; font-size:16px;">&lt; Back</button>
        <span id="detail-title" style="font-size:13px; font-weight:800;">Analysis Detail</span>
        <div style="width:50px;"></div>
    </div>
    <div id="detail-content" style="padding:20px;"></div>
</div>

<script>
    const DEFAULT_DB = {
        v1: ["Gym (체육관)", "Central Park (센트럴 파크)", "Pharmacy (약국)", "Airport (공항)", "Library (도서관)", "Museum (박물관)", "Zoo (동물원)", "Beach (해변)", "Mountain (산)", "Bank (은행)", "Post Office (우체국)", "Hospital (병원)", "University (대학교)", "Starbucks (스타벅스)", "Subway (지하철)", "Luxury Hotel (고급 호텔)", "Stadium (경기장)", "City Hall (시청)", "Harbor (항구)", "Amusement Park (놀이공원)", "Art Gallery (미술관)", "Police Station (경찰서)", "Fire Station (소방서)", "Castle (성)", "Temple (사원)", "Church (교회)", "Gas Station (주유소)", "Flower Shop (꽃집)", "Department Store (백화점)", "Market (시장)", "Cinema (영화관)", "Theater (극장)", "Concert Hall (콘서트 홀)", "Square (광장)", "Bridge (다리)", "Desert (사막)", "Forest (숲)", "Jungle (정글)", "Island (섬)", "Port (항구)"],
        v2: ["Fried Chicken (치킨)", "Kimchi Stew (김치찌개)", "Bulgogi (불고기)", "Tteokbokki (떡볶이)", "Bibimbap (비빔밥)", "Pasta (파스타)", "Steak (스테이크)", "Sushi (초밥)", "Ramen (라면)", "Pizza (피자)", "Hamburger (햄버거)", "Taco (타코)", "Burrito (부리토)", "Dim Sum (딤섬)", "Peking Duck (북경오리)", "Pho (쌀국수)", "Pad Thai (팟타이)", "Bagel (베이글)", "Macaron (마카롱)", "Gelato (젤라토)", "Brownie (브라우니)", "Waffle (와플)", "Pancake (팬케이크)", "Acaibowl (아사이볼)", "Salad (샐러드)", "Sandwich (샌드위치)", "Tonkatsu (돈가스)", "Udon (우동)", "Tempura (튀김)", "Kebab (케밥)", "Gyros (기로스)", "Risotto (리조또)", "Lasagna (라자냐)", "Clam Chowder (클램 차우더)", "Galbi (갈비)", "Naengmyeon (냉면)", "Dakgalbi (닭갈비)", "Yukhoe (육회)", "Gimbap (김밥)", "Japchae (잡채)", "Donut (도넛)", "Hot Dog (핫도그)", "BBQ Ribs (바비큐 립)", "Buffalo Wings (버팔로 윙)", "Omelette (오멜렛)", "Truffle Pasta (트러플 파스타)", "Bingsu (빙수)", "Malatang (마라탕)", "Tanghulu (탕후루)", "Tiramisu (티라미수)", "Croissant (크로와상)", "Cheesecake (치즈케이크)", "Mojito (모히또)", "Sangria (샹그리아)", "Soju (소주)", "Croque Monsieur (크로크무슈)", "Fish and Chips (피쉬앤칩스)", "Paella (파에야)", "Poutine (푸틴)", "Hummus (후무스)", "Falafel (팔라펠)", "Gnocchi (뇨끼)", "Ratatouille (라따뚜이)", "Sashimi (사시미)", "Unagi (장어구이)", "Shabu Shabu (샤브샤브)", "Mapo Tofu (마포두부)", "Spring Roll (스프링롤)", "Naan (난)", "Curry (카레)", "Churros (츄러스)", "Fondue (퐁듀)", "Goulash (굴라쉬)", "Escargot (에스카르고)", "Tapas (타파스)", "Miso Soup (미소된장국)", "Dumplings (만두)", "Kimchi (김치)", "Kalguksu (칼국수)", "Bossam (보쌈)", "Jokbal (족발)", "Gamjatang (감자탕)", "Sundae (순대)", "Mandu (만두)", "Pajeon (파전)", "Yakgwa (약과)", "Sikhye (식혜)", "Sujeonggwa (수정과)", "Dalgona (달고나)", "Honey Bread (허니브레드)", "Egg Drop (에그드랍)", "Gyeran-mari (계란말이)", "Dubu-kimchi (두부김치)", "Golbaengi-muchim (골뱅이무침)", "Jeon (전)", "Mandu-guk (만둣국)", "Sujebi (수제비)", "Kimbap (김밥)", "Jajangmyeon (짜장면)", "Jjamppong (짬뽕)"]
    };

    let rawDb = JSON.parse(localStorage.getItem('speaking_db_v36')) || DEFAULT_DB;
    let db = { v1: [], v2: [] };
    ['v1', 'v2'].forEach(c => (rawDb[c] || []).forEach(i => db[c].push(typeof i === 'string' ? {val: i, active: true} : i)));

    let studyArchive = JSON.parse(localStorage.getItem('study_archive_v36')) || [];
    let currentCat = 'v1', playMode = 'random', mediaRecorder, chunks = [], recInt, recSeconds = 0, rollInterval;
    let audioCtx, analyser, dataArray, animationId;

    window.onload = () => { loadDial('v1'); renderAdmin(); updateArchiveUI(); };

    function renderAdmin() {
        const cont = document.getElementById('adminContent');
        cont.innerHTML = ['v1', 'v2'].map(c => {
            const example = c === 'v1' ? 'Park (공원)' : 'Ramen (라면)';
            return `
            <div style="background:#fff; padding:20px; border-radius:22px; border:1px solid var(--border); margin-bottom:15px;">
                <div style="font-weight:900; margin-bottom:12px;">${c==='v1'?'Places':'Food'} (${db[c].length})</div>
                <div class="admin-add-form"><input type="text" id="add-input-${c}" class="admin-input" placeholder="추가..."><button class="admin-add-btn" onclick="addWord('${c}')">추가</button></div>
                <div class="admin-grid">${db[c].map((item, idx) => `<div class="admin-item" style="${item.active?'':'opacity:0.4;'}" onclick="toggleWord('${c}', ${idx})"><span style="font-size:12px; font-weight:700;">${item.val}</span><button class="del-btn" onclick="deleteWord('${c}', ${idx}, event)">×</button></div>`).join('')}</div>
            </div>`;
        }).join('');
    }

    function addWord(cat) { const input = document.getElementById(`add-input-${cat}`); const val = input.value.trim(); if(!val) return; db[cat].unshift({ val: val, active: true }); input.value = ""; saveDb(); renderAdmin(); }
    function saveDb() { localStorage.setItem('speaking_db_v36', JSON.stringify(db)); }
    function toggleWord(c, idx) { db[c][idx].active = !db[c][idx].active; saveDb(); renderAdmin(); }
    function deleteWord(c, idx, ev) { ev.stopPropagation(); if(confirm("Delete?")) { db[c].splice(idx, 1); saveDb(); renderAdmin(); } }

    function loadDial(type) {
        const track = document.getElementById('pickerTrack'); const active = db[type].filter(i => i.active); track.innerHTML = "";
        const combined = [...active, ...active, ...active];
        combined.forEach(i => { const s = i.val.split(' ('); track.innerHTML += `<div class="picker-node"><div>${s[0]}</div><div style="font-size:10px; color:#999;">${s[1]?s[1].replace(')',''):''}</div></div>`; });
        track.style.transition = 'none'; track.style.transform = `translateY(68px)`;
    }
    function handleSpin() {
        document.getElementById('spinBtn').style.display = 'none'; document.getElementById('stopDialBtn').style.display = 'flex';
        const track = document.getElementById('pickerTrack'); const activeCount = db[currentCat].filter(i => i.active).length;
        let pos = 68; rollInterval = setInterval(() => { pos -= 15; if(Math.abs(pos) >= (activeCount * 44)) pos = 68; track.style.transform = `translateY(${pos}px)`; }, 16);
    }
    function stopSpin() {
        clearInterval(rollInterval); document.getElementById('stopDialBtn').style.display = 'none';
        const track = document.getElementById('pickerTrack'); const activeCount = db[currentCat].filter(i => i.active).length;
        const finalIdx = Math.floor(Math.random() * activeCount) + activeCount;
        const targetY = -(finalIdx * 44) + 68;
        track.style.transition = "transform 2.5s cubic-bezier(0.1, 0.4, 0.1, 1)"; track.style.transform = `translateY(${targetY}px)`;
        setTimeout(() => { track.querySelectorAll('.picker-node').forEach(n => n.classList.remove('active')); track.children[finalIdx].classList.add('active'); setTimeout(() => startPractice(track.children[finalIdx].children[0].innerText), 1200); }, 2600);
    }

    function renderFeedbackView(res, fullText, containerId) {
        if(!res || !res.sentences) return;
        let html = `<div class="score-container"><div class="score-circle">${res.total_score || 0}</div><div class="score-comment">${getAIEvaluation(res.total_score || 0)}</div></div>`;
        res.sentences.forEach(s => {
            html += `<div class="compare-box"><span class="label-text">MY SPEECH</span><div class="orig-sentence">${s.orig}</div><span class="label-text" style="color:var(--deep-green-text);">AI RECOMMENDED</span><div class="better-sentence">${s.better_en}</div><div class="ko-bubble">${s.better_ko}</div><div class="tip-card"><div style="font-size:11px; font-weight:800; color:#8E8E93; margin-bottom:8px;">💡 ANALYSIS</div><div style="font-size:13.5px; color:#444; line-height:1.7;">${s.explanation || "자연스러운 표현입니다."}</div></div></div>`;
        });
        html += `<div style="background:#fff; padding:25px; border-radius:24px; border:1px solid #ddd; margin-top:30px;"><b class="label-text">FULL TRANSCRIPT</b><div>${fullText || ''}</div></div>`;
        document.getElementById(containerId).innerHTML = html;
        if(containerId === 'feedbackArea') document.getElementById('controlButtons').style.display = 'flex';
    }

    function updateArchiveUI() {
        const list = document.getElementById('archiveList'); if(!studyArchive || studyArchive.length === 0) { list.innerHTML = "<p style='text-align:center; padding:50px; color:#888;'>기록 없음</p>"; return; }
        list.innerHTML = studyArchive.map(e => `<div class="archive-card" onclick="openDetail(${e.id})"><span style="font-size:11px; color:var(--ios-blue); font-weight:800;">${e.ts}</span><div style="font-size:19px; font-weight:900;">${e.topic}</div><div style="display:flex;"><span class="arc-tag">⏱ ${e.duration}s</span><span class="arc-tag">🏆 ${e.score}pts</span></div></div>`).join('');
    }
    function openDetail(id) { const entry = studyArchive.find(x => x.id === id); if(!entry) return; renderFeedbackView({ total_score: entry.score, sentences: entry.sentences }, entry.full_text, 'detail-content'); document.getElementById('detail-title').innerText = entry.topic; document.getElementById('detail-view').style.display = 'block'; }
    function closeDetail() { document.getElementById('detail-view').style.display = 'none'; }

    function goTab(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === 'tab-'+id.split('-')[1])); if(id === 'sec-vocab') updateArchiveUI(); }
    function setMode(m) { playMode = m; document.getElementById('btn-m-rnd').classList.toggle('active', m==='random'); document.getElementById('btn-m-sel').classList.toggle('active', m==='select'); document.getElementById('random-ui').style.display = m==='random'?'block':'none'; document.getElementById('select-ui').style.display = m==='select'?'block':'none'; if(m==='random') loadDial(currentCat); else renderGrid(); }
    function setCat(c) { currentCat = c; document.getElementById('btn-c-v1').classList.toggle('active', c==='v1'); document.getElementById('btn-c-v2').classList.toggle('active', c==='v2'); if(playMode === 'random') loadDial(c); else renderGrid(); }
    function renderGrid() { document.getElementById('selectionGrid').innerHTML = db[currentCat].filter(i => i.active).map(t => `<div class="grid-item" onclick="startPractice('${t.val}')">${t.val}</div>`).join(''); }
    function startPractice(topic) { document.getElementById('random-ui').style.display='none'; document.getElementById('select-ui').style.display='none'; document.getElementById('cat-nav').style.display='none'; document.querySelector('.mode-switch').style.display='none'; document.getElementById('play-stage').style.display='block'; document.getElementById('targetTxt').innerText=topic; }
    function startCountdown() { const btn = document.getElementById('recordBtn'); let count = 3; btn.disabled = true; const timer = setInterval(() => { btn.innerText = `READY IN ${count}...`; count--; if(count < 0) { clearInterval(timer); btn.style.display = 'none'; document.getElementById('recordingPanel').style.display = 'flex'; startRecording(); } }, 1000); }
    
    async function startRecording() { 
        try { 
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContextClass(); 
            analyser = audioCtx.createAnalyser(); 
            audioCtx.createMediaStreamSource(stream).connect(analyser); 
            mediaRecorder = new MediaRecorder(stream); chunks = []; 
            mediaRecorder.ondataavailable = e => chunks.push(e.data); 
            mediaRecorder.onstop = processAI; 
            mediaRecorder.start(); 
            recSeconds = 0; recInt = setInterval(() => { recSeconds++; document.getElementById('recTimer').innerText = `${String(Math.floor(recSeconds/60)).padStart(2,'0')}:${String(recSeconds%60).padStart(2,'0')}`; }, 1000); 
            drawWave(); 
        } catch(e) { alert("Mic Error."); location.reload(); } 
    }
    function drawWave() { animationId = requestAnimationFrame(drawWave); analyser.getByteFrequencyData(new Uint8Array(analyser.frequencyBinCount)); const bars = document.querySelectorAll('.wave-bar'); bars.forEach((bar, i) => { bar.style.height = '15px'; }); } 
    function stopRecording() { mediaRecorder.stop(); clearInterval(recInt); if(audioCtx) audioCtx.close(); document.getElementById('recordingPanel').style.display = 'none'; document.getElementById('analyzingUI').style.display = 'block'; startProgressBar(); }
    function startProgressBar() { let w = 0; const bar = document.getElementById('progressBar'), per = document.getElementById('progressPercent'); const iv = setInterval(() => { if(w>=96) clearInterval(iv); else { w++; bar.style.width = w+'%'; per.innerText = w+'%'; } }, 150); }
    
    async function processAI() {
        const blob = new Blob(chunks, { type: 'audio/m4a' }); const reader = new FileReader(); reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            try {
                const response = await fetch("/api/openai-proxy", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ audio: base64Audio, topic: document.getElementById('targetTxt').innerText }) });
                const data = await response.json(); 
                document.getElementById('analyzingUI').style.display = 'none'; 
                renderFeedbackView(data, data.user_speech, 'feedbackArea'); 
                saveToArchive(data, document.getElementById('targetTxt').innerText, recSeconds); 
            } catch (e) { alert("Error."); location.reload(); }
        };
    }
    function saveToArchive(data, topic, duration) { studyArchive.unshift({ id: Date.now(), ts: new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }), topic: topic, duration: duration, score: data.total_score, sentences: data.sentences, full_text: data.user_speech }); localStorage.setItem('study_archive_v36', JSON.stringify(studyArchive)); }
    function deleteArchive(id, ev) { ev.stopPropagation(); if(confirm("삭제?")) { studyArchive = studyArchive.filter(x => x.id !== id); localStorage.setItem('speaking_db_v36', JSON.stringify(db)); updateArchiveUI(); } }
    function clearArchive() { if(confirm("전체 삭제?")) { studyArchive = []; localStorage.setItem('study_archive_v36', JSON.stringify(studyArchive)); updateArchiveUI(); } }
    function getAIEvaluation(s) { if(s>=90) return "완벽합니다!"; if(s>=75) return "훌륭합니다!"; return "좋습니다!"; }
</script>
