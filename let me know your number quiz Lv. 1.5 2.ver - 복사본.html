<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ryan's let me know</title>
    <style>
        :root {
            --primary: #3498DB; --success: #2ECC71; --danger: #E74C3C;
            --bg: #F8F9FA; --dark: #2C3E50; --highlight: #F1C40F;
        }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: var(--bg); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; touch-action: manipulation;
        }
        #app { 
            background: white; padding: 1.5rem; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 95%; max-width: 480px; 
            text-align: center; position: relative; max-height: 95vh; overflow-y: auto;
        }

        .screen { display: none; }
        .active { display: block; }

        h1 { font-size: 26px; color: var(--dark); margin-bottom: 10px; font-weight: 900; letter-spacing: -1.5px; }
        h1 span { color: var(--primary); }
        
        input, select { 
            width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #EEE; 
            border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }

        /* 게임 그리드 */
        #word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; transition: filter 0.4s; }
        .grid-header { font-size: 12px; color: #BBB; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .word-box { 
            height: 70px; display: flex; justify-content: center; align-items: center; 
            background: #FFF; border: 2px solid #F5F5F5; border-radius: 15px; 
            font-size: 15px; font-weight: bold; color: var(--dark); cursor: pointer;
            user-select: none; transition: 0.15s; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            word-break: keep-all; padding: 5px;
        }
        
        .word-box.confirming { background: #FFF9C4; border-color: var(--highlight); transform: scale(1.05); z-index: 5; }
        .word-box.completed { background: #333 !important; color: #666 !important; border-color: #222 !important; text-decoration: line-through; pointer-events: none; opacity: 0.8; }

        #countdown-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 20; border-radius: 25px;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        #countdown-number { font-size: 100px; font-weight: 900; color: var(--primary); }
        
        .result-card { background: var(--dark); color: white; padding: 30px; border-radius: 25px; text-align: left; margin: 20px 0; }
        .big-time { font-size: 55px; color: var(--success); text-align: center; display: block; font-weight: 900; }

        /* 관리자 패널 전용 스타일 */
        #admin-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; width: 95%; height: 85%; z-index: 100; border-radius: 20px;
            padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); overflow-y: auto; text-align: left;
        }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        .admin-table th, .admin-table td { border: 1px solid #EEE; padding: 6px; }
        .admin-table th { background: #F4F4F4; }
    </style>
</head>
<body>

<div id="app">
    <div id="lobby-screen" class="screen active">
        <h1><span>Ryan's</span> let me know</h1>
        <p style="font-size:11px; color:#999; margin-bottom: 20px;">Unique Word System (Versions 1-5)</p>
        <select id="version-select">
            <option value="1">Version 1</option><option value="2">Version 2</option>
            <option value="3">Version 3</option><option value="4">Version 4</option>
            <option value="5">Version 5</option>
        </select>
        <input type="text" id="user-name" placeholder="Name">
        <input type="number" id="user-number" placeholder="No. (1-24)" min="1" max="24">
        <button onclick="prepareGame()">START</button>
        <p onclick="toggleAdmin()" style="margin-top:25px; font-size:11px; color:#eee; cursor:pointer;">[Admin Mode]</p>
    </div>

    <div id="game-screen" class="screen">
        <div id="countdown-overlay"><div id="countdown-number">3</div></div>
        <div id="timer" style="font-size: 40px; font-weight: 900; color: var(--danger); font-family: monospace; margin-bottom: 10px;">0.00</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="grid-header">English</div>
            <div class="grid-header">Korean</div>
        </div>
        <div id="word-grid" style="filter: blur(45px);"></div>
    </div>

    <div id="result-screen" class="screen">
        <h2 style="font-size: 24px;">GAME OVER</h2>
        <div class="result-card">
            <div id="res-info" style="font-size:18px; border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:10px;"></div>
            <span class="big-time" id="res-time">0.00s</span>
        </div>
        <button onclick="location.reload()" style="background: var(--success);">Who's next?</button>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">버전/번호별 배정 단어 확인</h3>
        <button onclick="toggleAdmin()" style="width:60px; padding:8px; background:var(--danger); font-size:12px; margin:0;">닫기</button>
    </div>
    <select id="admin-version-view" onchange="renderAdminTable()" style="margin: 15px 0;">
        <option value="1">Version 1</option><option value="2">Version 2</option>
        <option value="3">Version 3</option><option value="4">Version 4</option>
        <option value="5">Version 5</option>
    </select>
    <table class="admin-table">
        <thead>
            <tr><th>번호</th><th>영어(5개)</th><th>한국어(5개)</th></tr>
        </thead>
        <tbody id="admin-body"></tbody>
    </table>
</div>

    let words = [], completedCount = 0, startTime, timerInterval;

    window.onload = () => { renderAdminTable(); };

    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function getWordData(ver, num) {
        // 글로벌 인덱스: 0 ~ 119
        const globalIdx = (parseInt(ver) - 1) * 24 + (parseInt(num) - 1);
        
        let engSet = [];
        let korSet = [];
        
        // Cat 0-4 (ENG), Cat 5-9 (KOR)
        for(let i=0; i<5; i++) engSet.push(categoryPools[i][globalIdx]);
        for(let i=5; i<10; i++) korSet.push(categoryPools[i][globalIdx]);
        
        return { eng: engSet, kor: korSet };
    }

    function renderAdminTable() {
        const ver = document.getElementById('admin-version-view').value;
        const b = document.getElementById('admin-body');
        b.innerHTML = "";
        for(let n=1; n<=24; n++) {
            const {eng, kor} = getWordData(ver, n);
            b.innerHTML += `<tr><td>${n}</td><td>${eng.join(', ')}</td><td>${kor.join(', ')}</td></tr>`;
        }
    }

    function prepareGame() {
        const name = document.getElementById('user-name').value;
        const num = document.getElementById('user-number').value;
        const ver = document.getElementById('version-select').value;
        if (!name || !num || num < 1 || num > 24) { alert("Please input Name and No.(1-24)"); return; }
        
        const {eng, kor} = getWordData(ver, num);
        
        // 5x2 배열로 섞어서 좌영우한 정렬
        words = [];
        for(let i=0; i<5; i++) {
            words.push(eng[i]); // 왼쪽
            words.push(kor[i]); // 오른쪽
        }

        const grid = document.getElementById('word-grid');
        grid.innerHTML = words.map((w, i) => `<div class="word-box" id="word-${i}" onclick="handleTouch(${i})">${w}</div>`).join('');
        
        document.getElementById('lobby-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        startCountdown();
    }

    function startCountdown() {
        let count = 3;
        const overlay = document.getElementById('countdown-overlay');
        const numDisp = document.getElementById('countdown-number');
        overlay.style.display = 'flex';
        const cd = setInterval(() => {
            count--;
            if(count > 0) numDisp.innerText = count;
            else {
                clearInterval(cd);
                overlay.style.display = 'none';
                document.getElementById('word-grid').style.filter = 'none';
                startTimer();
            }
        }, 1000);
    }

    function startTimer() {
        completedCount = 0;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            document.getElementById('timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2);
        }, 30);
    }

    function handleTouch(idx) {
        const el = document.getElementById(`word-${idx}`);
        if(window.navigator.vibrate) window.navigator.vibrate(40);

        if (el.classList.contains('confirming')) {
            el.classList.replace('confirming', 'completed');
            completedCount++;
            if (completedCount === 10) endGame();
        } else {
            document.querySelectorAll('.word-box.confirming').forEach(box => box.classList.remove('confirming'));
            el.classList.add('confirming');
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        const time = document.getElementById('timer').innerText;
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('res-info').innerHTML = `No.${document.getElementById('user-number').value} <strong>${document.getElementById('user-name').value}</strong>`;
        document.getElementById('res-time').innerText = time + "s";
    }
